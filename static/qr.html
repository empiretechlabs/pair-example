<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Empire_Md | QR Authentication</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8'
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'float': 'float 4s ease-in-out infinite'
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-8px)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
    }
    .card-shadow {
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }
    progress {
      appearance: none;
      border: none;
      overflow: hidden;
    }
    progress::-webkit-progress-bar {
      background-color: #f3f4f6;
      border-radius: 9999px;
    }
    progress::-webkit-progress-value {
      background: linear-gradient(to right, #3b82f6, #2563eb);
      border-radius: 9999px;
    }
    progress::-moz-progress-bar {
      background: linear-gradient(to right, #3b82f6, #2563eb);
      border-radius: 9999px;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/5 w-16 h-16 rounded-full bg-primary-100 animate-float opacity-40"></div>
    <div class="absolute bottom-1/3 right-1/4 w-20 h-20 rounded-full bg-primary-100 animate-float opacity-30" style="animation-delay: 1.5s"></div>
  </div>

  <div class="w-full max-w-sm animate-fade-in">
    <div class="bg-white rounded-xl card-shadow overflow-hidden border border-gray-100">
      <div class="bg-gradient-to-r from-primary-600 to-primary-500 p-6 text-center text-white">
        <div class="w-16 h-16 rounded-full bg-white/10 backdrop-blur-sm mx-auto mb-4 flex items-center justify-center border border-white/20">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h7v7H3V3zm11 0h7v7h-7V3zM3 14h4v4H3v-4zm7 0h4v4h-4v-4zm7 0h4v4h-4v-4zM14 14h3v3h-3v-3z" />
          </svg>
        </div>
        <h1 class="text-2xl font-semibold mb-1">Empire_Md</h1>
        <p class="text-sm opacity-90">Scan QR to connect</p>
      </div>

      <div class="p-6 text-center">
        <div class="mx-auto mb-5 w-fit rounded-xl border border-gray-200 bg-white p-3 shadow-sm">
          <div id="qr-loading" class="flex h-52 w-52 items-center justify-center">
            <svg class="h-8 w-8 animate-spin text-primary-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </div>
          <img
            id="qr-image"
            src="/qrcode"
            alt="WhatsApp QR code"
            class="hidden h-52 w-52 rounded-lg"
            onload="showQr()"
            onerror="showQrError()"
          >
        </div>

        <p id="legend" class="mb-4 text-sm text-gray-600">Open WhatsApp and scan this code</p>

        <div id="timer-block" class="mb-5">
          <progress id="progressBar" value="0" max="30" class="h-1.5 w-full rounded-full"></progress>
          <p id="timer-text" class="mt-2 text-xs text-primary-500">
            Expires in <span id="timeValue">30</span> seconds
          </p>
        </div>

        <div class="space-y-3">
          <button
            onclick="refreshQr()"
            class="flex w-full items-center justify-center gap-2 rounded-lg border border-primary-200 bg-primary-50 px-4 py-2.5 font-medium text-primary-600 transition-all duration-200 hover:border-primary-300 hover:bg-primary-100"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Refresh QR Code
          </button>

          <button
            onclick="window.location.href='/'"
            class="flex w-full items-center justify-center gap-2 rounded-lg border border-gray-200 bg-white px-4 py-2.5 font-medium text-gray-700 transition-all duration-200 hover:border-gray-300 hover:bg-gray-50"
          >
            Back to home
          </button>
        </div>
      </div>

      <div class="border-t border-gray-100 bg-gray-50 px-6 py-3 text-center">
        <p class="text-xs text-gray-400">Secure end-to-end connection</p>
      </div>
    </div>
  </div>

  <script>
    var timeleft = 30;
    var downloadTimer;
    var progressBar = document.getElementById("progressBar");
    var qrImage = document.getElementById("qr-image");
    var qrLoading = document.getElementById("qr-loading");
    var legendText = document.getElementById("legend");
    var timeValue = document.getElementById("timeValue");
    var timerBlock = document.getElementById("timer-block");

    function showQr() {
      qrLoading.classList.add("hidden");
      qrImage.classList.remove("hidden");
    }

    function showQrError() {
      qrLoading.innerHTML = "<p class='px-4 text-sm text-red-500'>Failed to load QR. Try refreshing.</p>";
    }

    function refreshQr() {
      window.location.reload();
    }

    function startTimer() {
      downloadTimer = setInterval(function() {
        if (timeleft <= 0) {
          clearInterval(downloadTimer);
          timerBlock.innerHTML = "<p class='text-sm font-medium text-red-500'>QR expired — refresh to get a new one</p>";
          legendText.textContent = "This code is no longer valid";
          return;
        }

        progressBar.value = 30 - timeleft;
        timeValue.textContent = timeleft;

        if (timeleft <= 10) {
          timeValue.classList.add("text-red-500");
          timeValue.classList.remove("text-primary-500");
        }

        timeleft -= 1;
      }, 1000);
    }

    startTimer();
  </script>
</body>
</html>
